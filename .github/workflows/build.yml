name: GraalVM Windows Build
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Path Structure
        shell: pwsh
        run: |
          Write-Host "--- Verifying JDK 24 Consolidated Metadata ---"
          $metaDir = "app/src/main/resources/META-INF/native-image/shell/victim"
          $metaFile = "$metaDir/reachability-metadata.json"
          
          if (Test-Path $metaFile) { 
              Write-Host "[OK] Found consolidated metadata at: $((Get-Item $metaFile).FullName)"
              Write-Host "--- File Content ---"
              Get-Content $metaFile
          } else {
              Write-Host "[!] Metadata file NOT found at $metaFile" -ForegroundColor Red
              Write-Host "Check your directory structure: $metaDir"
          }

      - name: Build Victim EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          :: The --info flag ensures we see if GraalVM picks up our config folder
          gradlew.bat :app:nativeVictimCompile --no-configuration-cache --info

      - name: Test Execution & Metadata Diagnostic
        shell: pwsh
        run: |
          $buildDir = "app/build/native/nativeVictimCompile"
          $exePath = "$buildDir/victim.exe"

          if (!(Test-Path $exePath)) {
              Write-Error "Binary not found at $exePath."
              return
          }

          Write-Host "[*] Copying runtime dependencies (VC Runtimes) to $buildDir..."
          Copy-Item "C:/Windows/System32/vcruntime140*.dll" -Destination "$buildDir/"
          Copy-Item "C:/Windows/System32/msvcp140.dll" -Destination "$buildDir/"

          Write-Host "[*] Running victim.exe with Diagnostic Warning Mode..."
          try {
              Push-Location $buildDir
              # This flag forces the app to warn about missing metadata instead of crashing
              .\victim.exe -XX:MissingRegistrationReportingMode=Warn
              Pop-Location
          } catch {
              Write-Host "Execution finished. Check logs above for 'Warning: Missing registration' messages."
          }
        continue-on-error: true

      - name: Package Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          if (Test-Path "app/build/native/nativeVictimCompile/victim.exe") {
              Copy-Item "app/build/native/nativeVictimCompile/victim.exe" -Destination "dist/"
              Copy-Item "C:/Windows/System32/vcruntime140*.dll" -Destination "dist/"
              Copy-Item "C:/Windows/System32/msvcp140.dll" -Destination "dist/"
          }
          Write-Host "--- Final Package Contents ---"
          Get-ChildItem -Path "dist"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: victim-standalone-package
          path: dist/
