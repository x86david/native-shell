name: GraalVM Windows Build
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Victim EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          gradlew.bat :app:nativeVictimCompile --no-configuration-cache

      - name: Package Artifacts
        shell: pwsh
        run: |
          # 1. Create the distribution directory
          New-Item -ItemType Directory -Force -Path "dist"
          
          # 2. Copy the Victim binary
          Copy-Item "app/build/native/nativeVictimCompile/victim.exe" -Destination "dist/"
          
          # 3. Grab the DLLs (Using absolute paths to be safe)
          Copy-Item "C:/Windows/System32/vcruntime140.dll" -Destination "dist/"
          Copy-Item "C:/Windows/System32/vcruntime140_1.dll" -Destination "dist/"
          Copy-Item "C:/Windows/System32/msvcp140.dll" -Destination "dist/"
          
          # 4. List the files to the log so we can see if they exist
          Get-ChildItem -Path "dist"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: victim-standalone-package
          path: dist/
