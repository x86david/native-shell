name: GraalVM Windows Build
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Victim EXE
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          gradlew.bat :app:nativeVictimCompile --no-configuration-cache
          :: Create the distribution folder
          mkdir dist
          :: FIX: Path updated to 'nativeVictimCompile' based on successful build logs
          copy app\build\native\nativeVictimCompile\victim.exe dist\
          :: Capture the required DLLs for standalone execution
          copy C:\Windows\System32\vcruntime140.dll dist\
          copy C:\Windows\System32\vcruntime140_1.dll dist\
          copy C:\Windows\System32\msvcp140.dll dist\

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: victim-standalone-package
          path: dist/
